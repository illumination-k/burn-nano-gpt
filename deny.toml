[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[advisories]
ignore = [
  # bincode 2.0.1 is unmaintained; pulled in transitively via burn-core with no safe upgrade.
  "RUSTSEC-2025-0141",
  # paste 1.0.15 is archived/unmaintained; pulled in transitively via burn-ndarray and cubecl with no safe upgrade.
  "RUSTSEC-2024-0436",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
