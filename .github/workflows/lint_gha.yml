name: Lint GitHub Actions

on:
  push:
    branches: [main]
    paths:
      - ".github/**"
  pull_request:
    paths:
      - ".github/**"

jobs:
  lint:
    runs-on: ubuntu-slim
    timeout-minutes: 15
    env:
      MISE_ENV: base
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: lint with mise
        run: mise run lint:gha
