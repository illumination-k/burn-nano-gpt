name: CodeQL Analysis

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9c6c5ab400c838ab09eec30bfeded23893cf60cc # v4.32.5

      - name: Autobuild
        uses: github/codeql-action/autobuild@9c6c5ab400c838ab09eec30bfeded23893cf60cc # v4.32.5

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@9c6c5ab400c838ab09eec30bfeded23893cf60cc # v4.32.5
